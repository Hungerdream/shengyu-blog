server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router 支持（所有路由回退到 index.html）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
